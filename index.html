            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563EB;
            --secondary: #3B82F6;
            --cta: #F97316;
            --background: #F8FAFC;
            --text: #1E293B;
            --text-light: #64748B;
            --card-bg: #FFFFFF;
            --shadow: 0 10px 40px rgba(37, 99, 235, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .page {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 开始页面 */
        .hero {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .title {
            font-family: 'Righteous', cursive;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--cta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 40px;
            font-weight: 300;
        }



        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px 48px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(37, 99, 235, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
            color: var(--text);
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        /* 测试页面 */
        .test-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: var(--shadow);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--cta));
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .question-card {
            animation: slideIn 0.4s ease-out;
        }

            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }

        .question-text {
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--text);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 2px solid #e2e8f0;
            padding: 20px 25px;
            border-radius: 16px;
            text-align: left;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            color: var(--text);
            line-height: 1.5;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.15);
        }

            border-color: var(--primary);
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.2);
        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
        }

        .question-actions .btn-primary,
        .question-actions .btn-secondary {
            min-width: 140px;
            padding: 14px 32px;
        }

        .question-actions .btn-primary:disabled,
        .question-actions .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option-btn {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);

            animation: bounceIn 0.8s ease-out;

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);

            50% {
                opacity: 1;
                transform: scale(1.1);
            }
            70% {
                transform: scale(0.9);
            }
            100% {

            font-family: 'Righteous', cursive;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--primary), var(--cta));

            -webkit-text-fill-color: transparent;

            margin-bottom: 20px;

            color: var(--text-light);

            line-height: 1.6;

                padding: 18px 20px;
                font-size: 1rem;
            }

</head>

            console.log('开始按钮:', startBtn);
            
            // 当前选中的选项
            let selectedOptionIndex = null;

            // 开始测试
            startBtn.addEventListener('click', function() {
                console.log('开始测试被点击');
                startPage.classList.remove('active');
                testPage.classList.add('active');
                currentQuestion = 0;
                answers = [];
                selectedOptionIndex = null;
                displayQuestion();
            });

            // 上一题
            prevBtn.addEventListener('click', function() {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    selectedOptionIndex = answers[currentQuestion] ? answers[currentQuestion].charCodeAt(0) - 65 : null;
                    answers.pop();
                    displayQuestion();
                    updateButtons();
                }
            });

            // 确定按钮
            confirmBtn.addEventListener('click', function() {
                if (selectedOptionIndex !== null) {
                    answers[currentQuestion] = String.fromCharCode(65 + selectedOptionIndex);
                    
                    if (currentQuestion < questions.length - 1) {
                        currentQuestion++;
                        selectedOptionIndex = null;
                        displayQuestion();
                        updateButtons();
                    } else {
                        showResult();
                    }
                }
            });

            // 更新按钮状态
            function updateButtons() {
                // 上一题按钮：第一题时禁用
                prevBtn.disabled = currentQuestion === 0;
                
                // 确定按钮：未选择选项时禁用
                confirmBtn.disabled = selectedOptionIndex === null;
            }

            // 开始测试
            startBtn.addEventListener('click', function() {
                console.log('开始测试被点击');
                startPage.classList.remove('active');
                testPage.classList.add('active');
                currentQuestion = 0;
                answers = [];
                displayQuestion();
            });

            // 重新测试
            retryBtn.addEventListener('click', function() {
                resultPage.classList.remove('active');
                startPage.classList.add('active');
            });

            // 分享结果
            shareBtn.addEventListener('click', function() {
                const personalityType = getPersonalityType(answers);
                const personality = personalityData[personalityType];
                const text = `我的动物人格是: ${personality.emoji} ${personality.title}\n${personality.description}\n\n来测测你的动物人格吧!`;
                
                if (navigator.share) {
                    navigator.share({
                        title: '我的动物人格测试结果',
                        text: text,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('结果已复制到剪贴板!');
                    }).catch(() => {
                        alert(text);
                    });
                }
            });

            // 显示问题
            function displayQuestion() {
                const question = questions[currentQuestion];
                
                // 更新进度条
                const progress = ((currentQuestion) / questions.length) * 100;
                progressFill.style.width = progress + '%';
                currentQuestionSpan.textContent = currentQuestion + 1;
                
                // 显示问题
                questionText.textContent = question.question;
                
                // 清空选项容器
                optionsContainer.innerHTML = '';
                
                // 创建选项按钮
                question.options.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.className = 'option-btn';
                    button.textContent = String.fromCharCode(65 + index) + '. ' + option;
                    
                    // 如果已经选择过,显示选中状态
                    if (selectedOptionIndex === index) {
                        button.classList.add('selected');
                    }
                    
                    button.addEventListener('click', function() {
                        selectAnswer(index);
                    });
                    optionsContainer.appendChild(button);
                });
                
                updateButtons();
            }

            // 选择答案
            function selectAnswer(index) {
                selectedOptionIndex = index;
                
                // 更新选中状态
                const allOptions = optionsContainer.querySelectorAll('.option-btn');
                allOptions.forEach((btn, i) => {
                    if (i === index) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                });
                
                updateButtons();
            }

            // 显示结果
            function showResult() {
                testPage.classList.remove('active');
                resultPage.classList.add('active');
                
                // 计算人格类型
                const personalityType = getPersonalityType(answers);
                const personality = personalityData[personalityType];
                
                // 显示结果
                resultEmoji.textContent = personality.emoji;
                resultTitle.textContent = personality.title;
                resultDescription.textContent = personality.description;
            }

            // 获取人格类型
            function getPersonalityType(answers) {
                const count = {
                    "卡皮巴拉": 0, "浣熊": 0, "比格": 0, "刺猬": 0,
                    "狸猫": 0, "黄牛": 0, "花枝鼠": 0, "鸭嘴兽": 0
                };
                
                answers.forEach((ans, index) => {
                    const optionIndex = ans.charCodeAt(0) - 65;
                    const type = mapping[index][optionIndex];
                    count[type]++;
                });
                
                let maxCount = 0;
                let maxTypes = [];
                for (const [type, num] of Object.entries(count)) {
                    if (num > maxCount) {
                        maxCount = num;
                        maxTypes = [type];
                    } else if (num === maxCount) {
                        maxTypes.push(type);
                    }
                }
                
                return maxTypes.length > 1 ? "鸭嘴兽" : maxTypes[0];
            }
        });
    </script>
</body>
</html>
